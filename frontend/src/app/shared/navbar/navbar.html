<nav class="navbar">
  <a class="brand" routerLink="/">Fichiers Compilés</a>

  <div class="nav-links">
    <a routerLink="/upload"       routerLinkActive="active">Upload</a>
    <a routerLink="/traitement"   routerLinkActive="active">Traitement</a>
    @if (isAuthenticated) {
      <a routerLink="/mes-fichiers" routerLinkActive="active">Mes fichiers</a>
    }
  </div>

  <div class="nav-user">
    @if (isAuthenticated) {
      <span class="username">{{ username }}</span>
      <button class="btn-logout" (click)="logout()">Déconnexion</button>
    } @else {
      <button class="btn-logout" (click)="login()">Se connecter</button>
    }
  </div>
</nav>
